name: CI/CD Pipeline

# Step 1: Define what triggers this automation
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # Step 2: Check out your code from GitHub into the runner machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 3: Log in to Docker Hub using the secrets we saved earlier
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets::DOCKERHUB_USERNAME }}
        password: ${{ secrets::DOCKERHUB_TOKEN }}

    # Step 4: Build the Docker image and push it to Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/my-python-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/my-python-api:${{ github.sha }}